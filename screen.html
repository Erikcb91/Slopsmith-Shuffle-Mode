<style>
  .shuffle-wrap { display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;font-family:system-ui,sans-serif;color:#e8e8f0 }
  .shuffle-wrap h1 { font-size:2rem;font-weight:700;margin-bottom:.25rem;letter-spacing:-.02em }
  .shuffle-subtitle { color:#888;font-size:.9rem;margin-bottom:2rem }
  .shuffle-card { background:#1a1a24;border:1px solid #2a2a3a;border-radius:16px;padding:2rem;width:100%;max-width:540px;display:flex;flex-direction:column;gap:1.25rem }
  .shuffle-now-playing { background:#12121a;border:1px solid #2a2a3a;border-radius:12px;padding:1.25rem 1.5rem;min-height:80px;display:flex;flex-direction:column;justify-content:center;gap:.2rem }
  .shuffle-now-playing.empty { color:#444;font-size:.9rem }
  .shuffle-song-title  { font-size:1.1rem;font-weight:600;color:#f0f0ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
  .shuffle-song-artist { font-size:.85rem;color:#888 }
  .shuffle-song-album  { font-size:.78rem;color:#555 }
  .shuffle-btn-row { display:flex;gap:.75rem }
  .shuffle-btn { cursor:pointer;border:none;border-radius:10px;font-size:.95rem;font-weight:600;padding:.75rem 1.25rem;transition:opacity .15s,transform .1s }
  .shuffle-btn:active { transform:scale(.97) }
  .shuffle-btn:disabled { opacity:.35;cursor:not-allowed }
  .shuffle-btn-primary { flex:1;background:#5b4fff;color:#fff;font-size:1.05rem }
  .shuffle-btn-primary:hover:not(:disabled) { background:#6d63ff }
  .shuffle-btn-secondary { background:#252535;color:#ccc }
  .shuffle-btn-secondary:hover:not(:disabled) { background:#2e2e45 }
  .shuffle-toggle-row { display:flex;align-items:center;justify-content:space-between;font-size:.88rem;color:#aaa }
  .shuffle-label { font-size:.8rem;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem;display:block }
  .shuffle-select { width:100%;background:#12121a;border:1px solid #2a2a3a;border-radius:8px;color:#e8e8f0;padding:.6rem .9rem;font-size:.9rem;outline:none }
  .shuffle-select:focus { border-color:#5b4fff }
  option { background:#1a1a24 }
  .shuffle-toggle { position:relative;width:38px;height:22px;display:inline-block }
  .shuffle-toggle input { opacity:0;width:0;height:0 }
  .shuffle-slider { position:absolute;inset:0;background:#252535;border-radius:22px;cursor:pointer;transition:background .2s }
  .shuffle-slider::before { content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s }
  input:checked + .shuffle-slider { background:#5b4fff }
  input:checked + .shuffle-slider::before { transform:translateX(16px) }
  .shuffle-section-title { font-size:.75rem;color:#555;text-transform:uppercase;letter-spacing:.06em }
  .shuffle-next-panel { background:#12121a;border:1px solid #2a2a3a;border-radius:10px;padding:.9rem 1.1rem;display:flex;flex-direction:column;gap:.2rem }
  .shuffle-history { list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.4rem;max-height:200px;overflow-y:auto }
  .shuffle-history li { background:#12121a;border:1px solid #1e1e2e;border-radius:8px;padding:.5rem .8rem;font-size:.82rem;color:#aaa;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:.5rem;transition:border-color .15s }
  .shuffle-history li:hover { border-color:#5b4fff;color:#e8e8f0 }
  .shuffle-hist-title  { font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
  .shuffle-hist-artist { color:#555;font-size:.78rem;white-space:nowrap }
  .shuffle-empty { color:#444;font-size:.85rem;text-align:center;padding:.5rem 0 }
  .shuffle-status { font-size:.8rem;min-height:1em;text-align:center;color:#666 }
  .shuffle-status.error { color:#e05 }
  @keyframes shuffle-spin { to { transform:rotate(360deg) } }
  .shuffle-spinner { display:inline-block;width:14px;height:14px;border:2px solid #444;border-top-color:#5b4fff;border-radius:50%;animation:shuffle-spin .7s linear infinite;vertical-align:middle;margin-right:6px }
</style>

<div class="shuffle-wrap">
  <h1>🔀 Shuffle</h1>
  <p class="shuffle-subtitle" data-i18n="subtitle"></p>

  <div class="shuffle-card">

    <!-- Now playing -->
    <div id="shuffle-now-playing" class="shuffle-now-playing empty">
      <span style="color:#444" data-i18n="pressToStart"></span>
    </div>

    <!-- Buttons -->
    <div class="shuffle-btn-row">
      <button id="shuffle-btn-main"  class="shuffle-btn shuffle-btn-primary"   data-i18n="shuffleBtn"></button>
      <button id="shuffle-btn-again" class="shuffle-btn shuffle-btn-secondary" data-i18n="repeatBtn" data-i18n-title="repeatTitle" disabled></button>
    </div>

    <!-- Auto-advance -->
    <div class="shuffle-toggle-row">
      <span data-i18n="autoAdvance"></span>
      <label class="shuffle-toggle"><input type="checkbox" id="shuffle-auto-advance" checked /><span class="shuffle-slider"></span></label>
    </div>

    <!-- Delay -->
    <div class="shuffle-toggle-row">
      <span data-i18n="delayWait"></span>
      <input type="number" id="shuffle-delay-seconds" value="5" min="0" max="30" step="1"
             style="width:60px;background:#12121a;border:1px solid #2a2a3a;border-radius:6px;color:#e8e8f0;padding:4px 8px;font-size:.9rem;outline:none;text-align:center" />
    </div>

    <!-- Anti-repeat -->
    <div class="shuffle-toggle-row">
      <span data-i18n="antiRepeat"></span>
      <label class="shuffle-toggle"><input type="checkbox" id="shuffle-anti-repeat" checked /><span class="shuffle-slider"></span></label>
    </div>

    <!-- Artist filter -->
    <div>
      <span class="shuffle-label" data-i18n="filterArtist"></span>
      <select id="shuffle-artist-filter" class="shuffle-select">
        <option value="" data-i18n="allArtists"></option>
      </select>
    </div>

    <!-- Tuning filter (NEW) -->
    <div>
      <span class="shuffle-label" data-i18n="filterTuning"></span>
      <select id="shuffle-tuning-filter" class="shuffle-select">
        <option value="" data-i18n="allTunings"></option>
      </select>
    </div>

    <!-- Language -->
    <div class="shuffle-toggle-row">
      <span data-i18n="langLabel"></span>
      <select id="shuffle-lang" style="background:#12121a;border:1px solid #2a2a3a;border-radius:6px;color:#e8e8f0;padding:4px 8px;font-size:.85rem;outline:none">
        <option value="es">Español</option>
        <option value="en">English</option>
      </select>
    </div>

    <!-- Status -->
    <div id="shuffle-status" class="shuffle-status"></div>

    <!-- Next song panel -->
    <div>
      <div class="shuffle-section-title" style="margin-bottom:.5rem" data-i18n="nextSong"></div>
      <div class="shuffle-next-panel">
        <div id="shuffle-next-title"  style="font-size:.9rem;font-weight:600;color:#f0f0ff">—</div>
        <div id="shuffle-next-artist" style="font-size:.8rem;color:#888">—</div>
        <div id="shuffle-next-tuning" style="font-size:.75rem;color:#a78bfa"></div>
      </div>
    </div>

    <!-- History -->
    <div>
      <div class="shuffle-section-title" style="margin-bottom:.5rem" data-i18n="recentHistory"></div>
      <ul id="shuffle-history" class="shuffle-history">
        <li id="shuffle-history-empty" class="shuffle-empty" data-i18n="noHistory"></li>
      </ul>
    </div>

  </div>
</div>
